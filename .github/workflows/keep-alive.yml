name: Keep Backend Alive

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes past the hour
  workflow_dispatch: # To trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        env:
          PING_URL: ${{ secrets.PING_URL }}
        run: |
          curl --fail --silent --show-error "$PING_URL"
